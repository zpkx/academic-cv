summary:
  zh: |
    我自我管理能力强，学习积极，动手能力出色。知识面广，分析能力强，能深入解决复杂技术难题。在IT和软件行业积累了丰富的跨领域经验。

    在团队中担任技术骨干和带头人，带领团队完成目标。英语听说读写流利，擅长跨部门沟通。

    我高度自驱，持续改进。主动钻研前沿技术，精益求精。自律且目标导向，持续交付高质量成果，同时推动团队创新与成长。
  en: |
    I have strong self-management, a proactive learning attitude, and excellent hands-on skills. With a broad knowledge base and strong analytical ability, I tackle complex technical problems effectively. Over 20 years in IT and software, I've built rich cross-domain experience.

    I serve as a technical backbone and team leader, driving teams to achieve goals. Fluent in English, I excel at cross-functional communication.

    Highly self-motivated and committed to continuous improvement, I proactively explore emerging technologies and strive for excellence. Disciplined and goal-oriented, I deliver high-quality results consistently while fostering team innovation and growth.

