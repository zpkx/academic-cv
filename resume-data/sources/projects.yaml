side_projects:
  - name:
      zh: "RCE UI 重写为 React"
      en: "RCE UI Rewrite in React"
    period: "2026/4 — 2026/5"
    stack:
      - "React 19/TypeScript/Vite"
      - "TanStack Query"
      - "AG Grid Enterprise"
      - "OIDC"
      - "pnpm Monorepo"
      - "AI Harness (Cursor/Claude Code)"
    summary:
      zh: "个人主导的探索项目：验证Vibe Coding和AI Harness实践，完成UI/UX现代化升级，利用React 19新特性优化性能。约2个月独立完成22个业务页面的全量重写。"
      en: "Personal exploratory project: validated Vibe Coding and AI Harness practices, modernized UI/UX, leveraged React 19 for performance. Completed full rewrite of 22 business pages in ~2 months."
    impact:
      - zh: "沉淀pnpm Monorepo + React 19 + Vite + Orval + TanStack Query现代前端脚手架和参考实现；输出React vs Angular差异分析、分支策略、发布checklist等文档。"
        en: "Produced modern frontend scaffold and reference implementation (pnpm Monorepo + React 19 + Vite + Orval + TanStack Query); authored docs on React vs Angular, branching strategy, release checklist."
      - zh: "完成OIDC SSO、AG Grid Enterprise、多环境运行时配置注入、Docker容器化部署、Playwright E2E测试等企业级能力适配，达到生产可用水平。"
        en: "Implemented OIDC SSO, AG Grid Enterprise, runtime multi-env config injection, Dockerized deployment, Playwright E2E tests, making the rewrite production-ready."
      - zh: "综合运用Superpowers插件和自建Skills对AI Coding Agent进行Harness，形成可复用的Agent工作流（TDD、系统化调试、代码审查、计划执行），提升AI在复杂任务中的可控性和产出质量。"
        en: "Combined Superpowers plugin and custom skills to harness AI Coding Agents into reusable workflows (TDD, systematic debugging, code review, plan execution), improving controllability and output quality."

  - name:
      zh: "Playwright 跨项目自动化测试框架"
      en: "Playwright Cross-Project Test Automation"
    period: "2025/2 — 2025/9"
    stack:
      - "Playwright/TypeScript"
      - "Page Object Model"
      - "TA JWT (RSA)"
      - "DUO OIDC"
      - "Express/Multer"
      - "Docker/Jenkins"
    summary:
      zh: "为团队引入现代化、可复用、跨项目的E2E自动化测试体系，解决长期缺乏自动化、依赖手工回归的问题。"
      en: "Introduced a modern, reusable, cross-project E2E automation system to solve the long-standing lack of automation and heavy reliance on manual regression."
    impact:
      - zh: "从0搭建通用测试框架，覆盖CART（E2E+API）和RCE（E2E/Regression/Smoke）多套测试矩阵，沉淀AG Grid自动化、Oracle DB直连校验、邮件通知等能力。"
        en: "Built a general test framework from scratch, covering CART (E2E+API) and RCE (E2E/Regression/Smoke) matrices; delivered reusable utilities for AG Grid automation, direct Oracle DB validation, email notifications."
      - zh: "设计TA JWT (RSA签名)测试认证方案，私钥经Conjur托管、CI中安全注入，彻底解决SSO无法自动化登录的难题。"
        en: "Designed TA JWT (RSA-signed) test authentication; private key hosted in Conjur and securely injected in CI, solving SSO login blockers in unattended automation."
      - zh: "自建并维护专用Playwright Docker镜像（含Oracle Instant Client），通过Jenkins Pipeline + 矩阵参数调度，每次PR/发布自动运行回归套件。"
        en: "Built and maintained custom Playwright Docker images (including Oracle Instant Client); orchestrated with Jenkins pipeline + matrix parameters to auto-run regression on every PR/release."
      - zh: "自建Test Report Server（Express + Multer），DUO OIDC保护浏览、OAuth2 JWT保护上传，Docker化部署，集中管理历史报告。"
        en: "Built a Test Report Server (Express + Multer) with DUO OIDC for browsing and OAuth2 JWT for uploads; Dockerized and centralized historical reports."
      - zh: "作为可复用模板被多个项目采纳，统一了团队的E2E测试标准。"
        en: "Adopted as a reusable template by multiple projects, standardizing E2E testing practices."

  - name: "NAS Video Downloader"
    period: "2025/6 — 2025/7"
    stack:
      - "Python/yt-dlp"
      - "PyYAML"
      - "Docker Compose"
      - "GitHub Actions"
    repository: "github.com/zpkx/video-downloader"
    summary:
      zh: "个人开源项目，解决多平台视频批量下载与归档痛点：手工维护URL列表、按类别分目录保存、避免触发限流，支持NAS/容器环境中改配置即自动下载。"
      en: "Open-source side project solving multi-platform bulk video download and archival: manually maintained URL lists, categorized directory saving, rate-limit avoidance, and auto-download on config change in NAS/container environments."
    impact:
      - zh: "封装VideoDownloader类，支持单URL、多URL、按类别批量下载，以及info-only/dry-run等非破坏性模式。"
        en: "Encapsulated VideoDownloader class (yt-dlp) supporting single URL, multiple URLs, category-based bulk download, and non-destructive modes (info-only/dry-run)."
      - zh: "使用urls.yaml定义分类目录、画质、延迟和URL列表；config.yaml集中管理yt-dlp选项，支持config目录自动探测加载。"
        en: "Used urls.yaml for category folders, quality, delays, and URL lists; config.yaml for centralized yt-dlp options, with auto-discovery loading."
      - zh: "提供Dockerfile + docker-compose（watcher/oneshot/manual多模式），监控urls.yaml变化自动触发下载；支持配置UID/GID避免权限问题。"
        en: "Provided Dockerfile + docker-compose with watcher/oneshot/manual modes; monitors urls.yaml changes to trigger downloads; supports configurable UID/GID to avoid permission issues."
      - zh: "配套docker-run.sh等脚本，分级日志、Cookie自动探测；通过GitHub Actions构建并发布镜像至GHCR，方便NAS长期拉取运行。"
        en: "Included helper scripts (docker-run.sh), layered logging, auto cookie detection; built and published images to GHCR via GitHub Actions for long-term NAS deployment."